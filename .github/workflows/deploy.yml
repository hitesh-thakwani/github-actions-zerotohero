name: Deploy Flask App

on: 
    workflow_dispatch: 

    
jobs: 
    deploy: 
        environment: 
            DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        runs-on: self-hosted
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: deploy with docker compose
              run: docker compose up -d --build
              

