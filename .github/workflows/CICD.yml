#this is the workflow name
name: CICD

#Manual click Workflow (DELIVER)
on:
  workflow_dispatch: 
    inputs:
      environments:
        description: This is the environment where all the workflow runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo 'code clone from github'
        
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build docker Container
        run: echo 'Docker container build'
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo 'Testing the container'
        
  deploy:
    if: inputs.environments == 'dev'
    needs: [build,test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo 'Docker compose deployed the app'
