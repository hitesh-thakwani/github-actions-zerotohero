#This is workflow name
name: Hello
on:
  workflow_dispatch:
    
#These are jobs inside the workflow

jobs:

  greet:
    runs-on: ubuntu-latest
    
    steps:
      - name: say hello to users
        run: echo 'Hello Hitesh'

      - name: say hello to username
        run: echo "Hello $USER"

  details:
    runs-on:  ubuntu-latest
    steps:
        - name: show the details of docker and python
          run: docker --version && python --version
        
  
